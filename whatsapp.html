<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coda WhatsApp — HubTec</title>
<style>
  :root{--green:#25d366;--green-d:#1da851;--ink:#111827;--sub:#6b7280;--line:#e5e7eb;--bg:#f6f7f9;--card:#fff;--blue:#2b3fbf}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;padding:20px 14px 60px}
  .wrap{max-width:680px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  h1{font-size:1.4rem;font-weight:800;letter-spacing:-.01em}
  .sub{color:var(--sub);font-size:.9rem;margin-bottom:18px}
  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .pill{background:#eef2ff;color:var(--blue);font-weight:700;font-size:.82rem;padding:5px 12px;border-radius:999px}
  .btn-refresh{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-weight:600;font-size:.86rem;cursor:pointer;color:var(--ink)}
  .btn-refresh:hover{background:#f0f2f5}
  input[type=search]{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:1rem;margin-bottom:18px;background:#fff}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:.2s}
  .card.done{opacity:.5}
  .card h3{font-size:1.08rem;font-weight:700;margin-bottom:2px}
  .meta{color:var(--sub);font-size:.84rem;margin-bottom:10px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:.9rem;margin-bottom:12px}
  .row a{color:var(--blue);text-decoration:none;font-weight:600}
  .row .tel{color:var(--ink);font-weight:600}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .wa{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;text-decoration:none;font-weight:700;font-size:.95rem;padding:12px 18px;border-radius:12px;flex:1;justify-content:center;min-width:180px}
  .wa:hover{background:var(--green-d)}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:.86rem;color:var(--sub);cursor:pointer;padding:12px 8px;user-select:none}
  .chk input{width:18px;height:18px;accent-color:var(--green)}
  .empty,.err{text-align:center;color:var(--sub);padding:50px 20px;background:#fff;border:1px dashed var(--line);border-radius:16px}
  .empty b{color:var(--ink)}
  .foot{text-align:center;color:#9aa0ab;font-size:.78rem;margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📲 Coda WhatsApp</h1>
  </header>
  <div class="sub">Attività senza email trovate dal motore. Clicca il pulsante verde: WhatsApp si apre col messaggio già scritto.</div>
  <div class="bar">
    <span class="pill" id="count">Carico…</span>
    <button class="btn-refresh" onclick="load()">↻ Aggiorna</button>
  </div>
  <input type="search" id="q" placeholder="Cerca per nome o comune…" oninput="render()">
  <div id="list"></div>
  <div class="foot">HubTec · i contattati restano segnati su questo dispositivo</div>
</div>

<script>
let rows=[];
const DONE_KEY='wa_done_v1';
function getDone(){try{return JSON.parse(localStorage.getItem(DONE_KEY)||'{}')}catch(e){return {}}}
function setDone(d){localStorage.setItem(DONE_KEY,JSON.stringify(d))}
function key(r){return (r.TELEFONO||'')+'|'+(r.NOME||'')}

function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length);
  if(!lines.length) return [];
  const head=lines[0].split(';');
  return lines.slice(1).map(l=>{
    const parts=l.split(';');
    const o={};head.forEach((h,i)=>o[h.trim()]=(parts[i]||'').trim());
    return o;
  });
}

async function load(){
  const list=document.getElementById('list');
  document.getElementById('count').textContent='Carico…';
  try{
    const res=await fetch('whatsapp-queue.csv?v='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    rows=parseCSV(await res.text());
    render();
  }catch(e){
    list.innerHTML='<div class="err">Non riesco a leggere la coda.<br>Riprova tra poco.</div>';
    document.getElementById('count').textContent='—';
  }
}

function render(){
  const list=document.getElementById('list');
  const done=getDone();
  const q=(document.getElementById('q').value||'').toLowerCase();
  let data=rows.filter(r=>r.NOME);
  const total=data.length, doneN=data.filter(r=>done[key(r)]).length;
  document.getElementById('count').textContent = total? (total+' lead · '+doneN+' fatti') : 'Coda vuota';
  if(q) data=data.filter(r=>((r.NOME||'')+' '+(r.COMUNE||'')).toLowerCase().includes(q));
  // non-fatti prima
  data.sort((a,b)=>(done[key(a)]?1:0)-(done[key(b)]?1:0));
  if(!total){
    list.innerHTML='<div class="empty"><b>Nessun lead in coda.</b><br>Comparirà qui appena il motore trova un’attività senza email.</div>';
    return;
  }
  list.innerHTML = data.map(r=>{
    const k=key(r), isDone=!!done[k];
    const sito = r.SITO? '<a href="'+r.SITO+'" target="_blank" rel="noopener">Vedi sito ↗</a>' : '';
    const wa = r.LINK_WHATSAPP? '<a class="wa" href="'+r.LINK_WHATSAPP+'" target="_blank" rel="noopener">💬 Scrivi su WhatsApp</a>' : '';
    return '<div class="card'+(isDone?' done':'')+'">'
      +'<h3>'+esc(r.NOME)+'</h3>'
      +'<div class="meta">'+esc([r.COMUNE,r.DATA].filter(Boolean).join(' · '))+'</div>'
      +'<div class="row"><span class="tel">'+esc(r.TELEFONO||'')+'</span>'+sito+'</div>'
      +'<div class="actions">'+wa
      +'<label class="chk"><input type="checkbox" '+(isDone?'checked':'')+' onchange="toggle(\''+k.replace(/'/g,"\\'")+'\',this.checked)">fatto</label>'
      +'</div></div>';
  }).join('');
}
function toggle(k,v){const d=getDone();if(v)d[k]=1;else delete d[k];setDone(d);render();}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
load();
</script>
</body>
</html>
